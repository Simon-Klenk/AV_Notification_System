<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AV System - Hardware Simulation</title><style>body{font-family:sans-serif;background-color:#f9fafb;min-height:100vh;margin:0;display:flex;flex-direction:column;font-weight:300}nav{background-color:#2d2d2d;padding:1rem;box-shadow:0 4px 6px -1px rgba(0,0,0,.1)}.nav-list{max-width:64rem;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:1.5rem}.nav-link{color:#d1d5db;font-size:1.125rem;font-weight:400;padding:.5rem;border-radius:.375rem;text-decoration:none;white-space:nowrap;transition:color .2s,background-color .2s}.nav-link:hover,.nav-link.active{color:#fff;background-color:#4b5563}main{flex-grow:1;padding:2rem 1rem;display:flex;justify-content:center}.content-container{display:flex;flex-direction:column;width:100%;max-width:48rem;gap:1.5rem;align-items:center}.message-box{background-color:#fff;padding:1.5rem;border-radius:.75rem;box-shadow:0 10px 15px -3px rgba(0,0,0,.1);width:100%;text-align:center}.title{font-size:1.5rem;font-weight:700;color:#22c55e;margin-bottom:1.5rem}.update-button-container{display:flex;flex-direction:column;gap:1rem;margin:0 auto}.update-button{width:100%;padding:1rem 2rem;font-size:1.1rem;font-weight:600;background-color:#595959;color:#fff;border-radius:.75rem;box-shadow:0 4px 6px -1px rgba(0,0,0,.1);cursor:pointer;border:none}.message-success{color:#22c55e;font-weight:600;margin-top:1rem}.hidden{display:none!important}@media (max-width:640px){.nav-list{flex-direction:column;gap:.5rem}.nav-link{width:90%}}</style></head><body><nav><div class="nav-list"><a href="/?page=pickup" class="nav-link">Kind abholen</a><a href="/?page=parking" class="nav-link">Fahrzeug umparken</a><a href="/?page=emergency" class="nav-link">Notfall</a><a href="/?page=system" class="nav-link active">System</a><a href="/?page=status" class="nav-link">Status</a></div></nav><main><div class="content-container"><div class="message-box"><h2 class="title" style="color:#3b82f6">Hardware Simulation</h2><div class="update-button-container"><button type="button" class="update-button" style="background-color:#22c55e" onclick="sim('ACCEPT')">Knopf: ANNEHMEN</button><button type="button" class="update-button" style="background-color:#ef4444" onclick="sim('REJECT')">Knopf: ABLEHNEN</button><p id="sim-s" class="message-success hidden"></p></div></div><div class="message-box"><h2 class="title">System-Update</h2><form class="update-button-container" id="updateForm"><button type="button" class="update-button" id="triggerUpdateButton">Update starten</button><p id="status-message" class="message-success hidden"></p></form></div><div class="message-box"><h2 class="title" style="color:#4b5563">System-Log</h2><button type="button" class="update-button" id="loadLogButton">Log laden</button><pre id="logContent" style="text-align:left;background-color:#eee;padding:10px;margin-top:1rem;max-height:400px;overflow-y:scroll;white-space:pre-wrap;word-break:break-all"></pre></div></div></main><script>const s=document.getElementById('status-message'),u=document.getElementById('triggerUpdateButton'),l=document.getElementById('logContent'),b=document.getElementById('loadLogButton'),ss=document.getElementById('sim-s');async function sim(a){try{const r=await fetch(`/simulate?action=${a}`,{method:'POST'});if(!r.ok)throw 0;ss.textContent=`${a} gesendet!`;ss.style.color=a==='ACCEPT'?'#22c55e':'#ef4444';ss.classList.remove('hidden')}catch(e){ss.textContent='Fehler';ss.classList.remove('hidden')}finally{setTimeout(()=>ss.classList.add('hidden'),3000)}}u.addEventListener('click',()=>{if(confirm('Update starten?'))trig()});async function trig(){try{u.disabled=!0;const r=await fetch('/system',{method:'POST'});if(!r.ok)throw 0;s.textContent='Update gestartet!';s.classList.remove('hidden')}catch(e){s.textContent='Fehler!';s.classList.remove('hidden')}finally{setTimeout(()=>{s.classList.add('hidden');u.disabled=!1},5000)}}async function loadLog(){l.textContent="Lade...";b.disabled=!0;try{const r=await fetch('/log');if(!r.ok)throw 0;l.textContent=await r.text()}catch(e){l.textContent='Fehler beim Laden'}finally{b.disabled=!1}}b.addEventListener('click',loadLog);document.addEventListener('DOMContentLoaded',loadLog);</script></body></html>
